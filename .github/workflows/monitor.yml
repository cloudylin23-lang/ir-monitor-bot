name: IR Monitor Bot

on:
  schedule:
    - cron: '0 1,9 * * *' # Chạy vào 8:00 sáng và 4:00 chiều giờ VN (UTC+7)
  workflow_dispatch:      # Cho phép bạn bấm nút chạy thử thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run Monitor Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/processed_hash.db
          git commit -m "Update processed news database" || echo "No changes to commit"
          git push